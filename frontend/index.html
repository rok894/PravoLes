<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PravoLes — Leseni kosi iz delavnice</title>
    <meta name="description" content="PravoLes ponuja ročno izdelane lesene kose — stole, predalčnike in unikatne izdelke iz slovenskega lesa. Oglejte si ponudbo in stopite v stik." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PravoLes" />
    <meta property="og:title" content="PravoLes — Leseni kosi iz delavnice" />
    <meta property="og:description" content="Ročno izdelani leseni kosi iz slovenskega lesa. Stoli, predalčniki in unikatni izdelki po meri." />
    <meta property="og:image" content="/images/stol_1.jpg" />
    <meta property="og:image:alt" content="Ročno izdelan leseni stol iz delavnice PravoLes" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2f2117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PravoLes" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PravoLes — Leseni kosi iz delavnice" />
    <meta name="twitter:description" content="Ročno izdelani leseni kosi iz slovenskega lesa. Oglejte si ponudbo." />
    <meta name="twitter:image" content="/images/stol_1.jpg" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("theme");
          const prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme =
            stored === "dark" || stored === "light"
              ? stored
              : prefersDark
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
